<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Image to PDF & Format Converter</title>

  <!-- استدعاء مكتبة jsPDF للتحويل إلى PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans",Arial}
    body{background:#f6f7f9;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:100%;max-width:900px;background:#fff;padding:18px;border-radius:12px;box-shadow:0 6px 18px rgba(10,20,40,0.08)}
    h1{text-align:center;margin:6px 0 14px; color:#0b5cff}
    .row{display:grid;grid-template-columns:1fr 320px;gap:16px}
    @media(max-width:880px){.row{grid-template-columns:1fr}}
    .left{padding:6px}
    .drop{border:2px dashed #d0d6df;border-radius:10px;padding:18px;text-align:center;cursor:pointer;background:#fbfcfe; transition: 0.3s;}
    .drop.drag{border-color:#0b5cff; background:#f0f4ff}
    .preview img{max-width:100%;height:auto;border-radius:8px;display:block;margin:12px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1)}
    label{display:block;margin-bottom:6px;font-size:13px; font-weight: bold;}
    select,input[type="number"],input[type="range"]{width:100%;padding:8px;border-radius:8px;border:1px solid #dde4ea;box-sizing:border-box}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:12px}
    .btn{display:inline-block;width:100%;padding:12px;border-radius:8px;background:#0b5cff;color:#fff;border:none;cursor:pointer; font-weight: bold; font-size: 15px}
    .btn:disabled{background:#ccc;cursor:not-allowed}
    .small{font-size:13px;color:#666;margin-top:8px}
    .link-row{text-align:center;margin-top:14px}
  </style>
</head>
<body>
  <div class="card">
    <h1>🔄 Image & PDF Converter</h1>

    <div style="max-width:750px;margin:0 auto 25px;padding:16px 20px;background:#f0f4ff;border-left:5px solid #0b5cff;border-radius:10px;color:#333;font-size:15px;text-align:center;">
      <p>Convert your images to <strong>PNG, JPG, WEBP</strong> or professional <strong>PDF</strong> documents instantly and privately.</p>
    </div>

    <div class="row">
      <div class="left">
        <div id="dropZone" class="drop">
          Drag & drop or click to upload<br>
          <small class="small">Supports PNG / JPEG / WEBP</small>
          <input id="fileInput" type="file" accept="image/*" style="display:none">
        </div>

        <div class="controls">
          <div>
            <label for="toFormat">Convert to</label>
            <select id="toFormat">
              <option value="image/png">PNG (Image)</option>
              <option value="image/jpeg">JPEG (Image)</option>
              <option value="image/webp">WEBP (Image)</option>
              <option value="application/pdf">PDF (Document)</option>
            </select>
          </div>

          <div>
            <label for="qualityRange">Quality <span id="qLabel">90%</span></label>
            <input id="qualityRange" type="range" min="0.1" max="1" step="0.05" value="0.9">
          </div>

          <div>
            <label for="widthInput">Width (px)</label>
            <input id="widthInput" type="number" min="0" value="0">
          </div>

          <div>
            <label for="heightInput">Height (px)</label>
            <input id="heightInput" type="number" min="0" value="0">
          </div>

          <div style="align-self:end; padding-bottom: 10px;">
            <label style="cursor:pointer"><input id="keepAspect" type="checkbox" checked> Keep aspect ratio</label>
          </div>

          <div style="grid-column: 1 / -1">
            <button id="convertBtn" class="btn" disabled>⬇ Convert & Download</button>
          </div>
        </div>

        <p class="small" style="text-align: center;">All processing happens in your browser. 100% Secure.</p>
      </div>

      <div>
        <div id="previewArea" class="preview">
             <p style="text-align:center;color:#ccc;margin-top:50px">Preview will appear here</p>
        </div>
        <div id="meta" class="small" style="text-align:center"></div>
      </div>
    </div>
  </div>

<canvas id="canvas" style="display:none"></canvas>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const previewArea = document.getElementById('previewArea');
const meta = document.getElementById('meta');
const toFormat = document.getElementById('toFormat');
const qualityRange = document.getElementById('qualityRange');
const qLabel = document.getElementById('qLabel');
const widthInput = document.getElementById('widthInput');
const heightInput = document.getElementById('heightInput');
const keepAspect = document.getElementById('keepAspect');
const convertBtn = document.getElementById('convertBtn');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let image = new Image();
let originalName = '';
let aspect = 1;

// استيراد jsPDF من النافذة
const { jsPDF } = window.jspdf ? window.jspdf : { jsPDF: null };

dropZone.onclick = () => fileInput.click();
fileInput.onchange = (e) => { if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]); };

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag'); };
dropZone.ondragleave = e => { e.preventDefault(); dropZone.classList.remove('drag'); };
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) loadFile(f);
};

function loadFile(file){
  if(!file.type.startsWith('image/')) return alert("Please select a valid image file.");
  originalName = file.name.replace(/\.[^/.]+$/, "");
  const reader = new FileReader();
  reader.onload = (ev) => {
    image = new Image();
    image.onload = () => {
      aspect = image.width / image.height;
      previewArea.innerHTML = '';
      image.style.maxWidth = '100%';
      previewArea.appendChild(image);
      meta.innerHTML = `Original: <strong>${image.width} × ${image.height}</strong> px`;
      convertBtn.disabled = false;
      widthInput.value = image.width;
      heightInput.value = image.height;
    };
    image.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

qualityRange.oninput = () => qLabel.textContent = Math.round(qualityRange.value*100) + '%';

widthInput.oninput = () => {
  if(keepAspect.checked && image.width){
    const w = parseInt(widthInput.value) || 0;
    if(w > 0) heightInput.value = Math.round(w / aspect);
  }
};

heightInput.oninput = () => {
  if(keepAspect.checked && image.height){
    const h = parseInt(heightInput.value) || 0;
    if(h > 0) widthInput.value = Math.round(h * aspect);
  }
};

convertBtn.onclick = () => {
  if(!image.src) return;

  const mime = toFormat.value;
  const q = parseFloat(qualityRange.value);
  const w = parseInt(widthInput.value) || image.width;
  const h = parseInt(heightInput.value) || image.height;

  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(image, 0, 0, w, h);

  if (mime === 'application/pdf') {
    // منطق تحويل PDF
    if (!jsPDF) return alert("PDF library failed to load.");
    
    const orientation = w > h ? 'l' : 'p';
    const pdf = new jsPDF({
      orientation: orientation,
      unit: 'px',
      format: [w, h]
    });

    const imgData = canvas.toDataURL('image/jpeg', q);
    pdf.addImage(imgData, 'JPEG', 0, 0, w, h);
    pdf.save(`${originalName}.pdf`);
  } else {
    // منطق تحويل الصور العادي
    canvas.toBlob(blob => {
      const ext = mime.split('/')[1];
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${originalName}-converted.${ext}`;
      link.click();
      URL.revokeObjectURL(link.href);
    }, mime, q);
  }
};
</script>
</body>
</html>
